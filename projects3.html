<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Title</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 20px;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.description {
  color: #475569;
  line-height: 1.6;
  margin-bottom: 40px;
}

.section {
  margin-bottom: 40px;
}

.section h2 {
  margin-bottom: 12px;
}

.file-list a {
  display: inline-block;
  margin: 6px 10px 6px 0;
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  border: 1px solid #cbd5e1;
  font-size: 14px;
  font-weight: 500;
  color: #0f172a;
}

.file-list a:hover {
  background: #f1f5f9;
}

iframe {
  width: 100%;
  height: 600px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
}

.back {
  display: inline-block;
  margin-top: 50px;
  padding: 12px 20px;
  border-radius: 999px;
  text-decoration: none;
  border: 1px solid #cbd5e1;
  font-weight: 600;
}

.back:hover {
  background: #f1f5f9;
}
</style>
</head>

<body>

<div class="container">

  <!-- TITLE -->
  <h1>Project Title</h1>

  <!-- DESCRIPTION -->
  <p class="description">
    Write your project description here. Explain what the project is,
    what methods you used, and what it shows.
  </p>

  <!-- FILE LINKS -->
  <div class="section">
    <h2>Files</h2>
    <div class="file-list">
      <a href="files/project/file.pdf" target="_blank">PDF</a>
      <a href="files/project/file.docx" target="_blank">DOCX</a>
      <a href="files/project/file.ipynb" target="_blank">Notebook</a>
      <a href="files/project/file.md" target="_blank">Markdown</a>
      <a href="files/project/file.py" target="_blank">Python</a>
      <a href="files/project/file.csv" target="_blank">CSV</a>
      <a href="files/project/file.txt" target="_blank">Text</a>
    </div>
  </div>

  <!-- PDF PREVIEW (optional but recommended) -->
  <div class="section">
    <h2>Preview</h2>
    <iframe src="files/project/file.pdf"></iframe>
  </div>

  <!-- BACK BUTTON -->
  <a href="projects.html" class="back">← Back to Projects</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Malachi Horsangchai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    .left {
      width: 50%;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .right {
      width: 50%;
      background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
      background-size: cover;
      background-position: center;
    }

    img {
      width: 150px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 10px 0;
      color: #1e293b;
    }

    p {
      max-width: 400px;
      color: #444;
    }

    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      width: 200px;
      background: #1e293b;
      color: white;
      border-radius: 25px;
      text-decoration: none;
    }

    .btn:hover {
      background: #334155;
    }

    .icons {
      margin-top: 20px;
    }

    .icons a {
      margin: 0 10px;
      text-decoration: none;
      color: #1e293b;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="left">
  <img src="https://via.placeholder.com/150" alt="profile">

  <h1>Malachi Horsangchai</h1>

  <p>
    Hi, I'm Malachi, a student at the University of Rochester studying
    Statistics, Political Science, and History.
    I’m interested in analyzing politics through data.
  </p>

  <div class="buttons">
    <a href="#" class="btn">Projects</a>
    <a href="#" class="btn">Resume</a>
    <a href="#" class="btn">Contact</a>
  </div>

  <div class="icons">
    <a href="#">LinkedIn</a>
    <a href="#">GitHub</a>
  </div>
</div>

<div class="right"></div>

</body>
</html>
